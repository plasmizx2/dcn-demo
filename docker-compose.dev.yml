version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dcn_user
      POSTGRES_PASSWORD: dcn_pass
      POSTGRES_DB: dcn_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dcn_user:dcn_pass@postgres:5432/dcn_demo
      BASE_URL: http://localhost:8000
    depends_on:
      - postgres
    volumes:
      - ./backend:/app/backend
      - ./frontend/web:/app/frontend/web
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/web:/app
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
