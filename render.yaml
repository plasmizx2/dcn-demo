# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect the repo, set env vars in the dashboard (or sync from a secret store).

services:
  - type: web
    name: dcn-demo
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: CEO_EMAIL
        sync: false

previews:
  generation: PR # Generate preview environments for pull requests
  expiration: 7d # Keep preview environments for 7 days
  # Optional: Add specific PR branches to include/exclude
  # pullRequestPattern: "fix/*" # Only create previews for PRs with branches matching this pattern
