# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect the repo, set env vars in the dashboard (or sync from a secret store).

services:
  - type: web
    name: dcn-demo
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: CEO_EMAIL
        sync: false
