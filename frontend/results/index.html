<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCN — Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#14161e;--surface:rgba(255,255,255,0.10);--surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.14);
  --text:#e8e8ec;--muted:#b4b4bc;--dim:#8a8a96;--dark:#52525b;
  --accent:#7c3aed;--accent2:#6366f1;--accent3:#3b82f6;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--cyan:#06b6d4;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* TOP HEADER */
.topnav{display:none}

/* ── Admin Nav Sidebar ── */
.admin-nav-sidebar{width:240px;min-width:240px;background:rgba(16,18,26,0.55);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;bottom:0;z-index:10}
.admin-nav-sidebar .sidebar-logo{font-weight:800;font-size:20px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;padding:0 24px;margin-bottom:8px;display:block}
.admin-nav-sidebar .sidebar-role{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#7c3aed;padding:0 24px;margin-bottom:24px}
.admin-nav-sidebar .nav-links{display:flex;flex-direction:column;gap:2px;flex:1;padding:0 12px}
.admin-nav-sidebar .nav-links a{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.45);text-decoration:none;font-size:0.88rem;font-weight:500;padding:10px 14px;border-radius:10px;transition:all 0.15s}
.admin-nav-sidebar .nav-links a:hover{color:#fff;background:rgba(255,255,255,0.04)}
.admin-nav-sidebar .nav-links a.active{color:#fff;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(59,130,246,0.10));border:1px solid rgba(124,58,237,0.2)}
.admin-nav-sidebar .nav-links a svg{width:18px;height:18px;flex-shrink:0}
.sidebar-bottom{padding:16px 12px 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:auto}
.sidebar-user{padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
.sidebar-user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-user-name{font-size:0.85rem;font-weight:600;color:#fff}
.sidebar-user-role-label{font-size:0.7rem;color:rgba(255,255,255,0.35);text-transform:capitalize}
.sidebar-signout{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.35);text-decoration:none;font-size:0.82rem;font-weight:500;padding:10px 14px;border-radius:10px;transition:all 0.15s}
.sidebar-signout:hover{color:#ef4444;background:rgba(239,68,68,0.06)}
.sidebar-signout svg{width:16px;height:16px}
.outer-layout{display:flex;height:100vh}
.results-main{margin-left:240px;flex:1;min-width:0}

/* LAYOUT */
.layout{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:340px;min-width:340px;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;background:rgba(16,18,26,0.45);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.sidebar-header{padding:20px 20px 12px}
.sidebar-header h2{font-size:0.82rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.5px}
.sidebar-header .count{font-size:0.72rem;color:var(--dim);margin-top:4px;font-weight:400}

.search-box{padding:0 16px 12px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--dark)}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.8rem;font-family:inherit;transition:all 0.2s}
.search-wrap input:focus{outline:none;border-color:rgba(124,58,237,0.4);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.search-wrap input::placeholder{color:var(--dark)}

.filter-bar{display:flex;gap:4px;padding:0 16px 12px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit;text-transform:uppercase;letter-spacing:0.3px}
.filter-btn:hover{border-color:var(--border2);color:var(--muted)}
.filter-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent3));border-color:transparent;color:#fff}

.job-list{flex:1;overflow-y:auto;padding:4px 8px}
.job-list::-webkit-scrollbar{width:5px}
.job-list::-webkit-scrollbar-track{background:transparent}
.job-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.10);border-radius:3px}

.job-item{padding:14px 16px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:all 0.15s;border:1px solid transparent;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.job-item:hover{background:rgba(255,255,255,0.05)}
.job-item.selected{background:rgba(124,58,237,0.04);border-color:rgba(124,58,237,0.15)}
.job-item .job-title{font-size:0.82rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-item .job-meta{display:flex;gap:8px;align-items:center;margin-top:6px;font-size:0.68rem;color:var(--dim)}

/* TYPE BADGES */
.type-badge{padding:3px 10px;border-radius:20px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.type-ml_experiment{background:rgba(124,58,237,0.12);color:#a78bfa}

.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-completed{background:var(--green)}
.status-queued{background:var(--yellow)}
.status-running{background:var(--accent2);animation:pulse 2s infinite}
.status-failed{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* CONTENT */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.10);border-radius:3px}

.content-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:0.88rem;flex-direction:column;gap:8px}
.content-empty svg{width:40px;height:40px;color:var(--dark);margin-bottom:4px}

/* DETAIL HEADER */
.detail-header{padding:28px 36px 0;flex-shrink:0}
.detail-header h2{font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:-0.5px}
.detail-meta{display:flex;gap:14px;align-items:center;margin-top:10px;font-size:0.78rem;color:var(--dim)}
.detail-meta .type-badge{font-size:0.65rem}
.copy-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit}
.copy-btn:hover{border-color:rgba(124,58,237,0.4);color:#fff;background:rgba(124,58,237,0.08)}

/* TABS */
.tab-bar{display:flex;gap:0;padding:0 36px;margin-top:20px;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{padding:10px 20px;font-size:0.78rem;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;position:relative}
.tab:hover{color:var(--muted)}
.tab.active{color:#fff;border-bottom-color:var(--accent)}

/* OUTPUT */
.output-area{padding:28px 36px;flex:1}

/* MARKDOWN */
.markdown-body{line-height:1.75;font-size:0.88rem}
.markdown-body h1{font-size:1.35rem;font-weight:700;color:#fff;margin:28px 0 12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.markdown-body h2{font-size:1.15rem;font-weight:700;color:#fff;margin:24px 0 10px}
.markdown-body h3{font-size:1rem;font-weight:600;color:var(--text);margin:20px 0 8px}
.markdown-body p{margin:10px 0;color:#d4d4d8}
.markdown-body ul,.markdown-body ol{padding-left:24px;margin:10px 0}
.markdown-body li{margin:5px 0;color:#d4d4d8}
.markdown-body strong{color:#fff}
.markdown-body code{background:rgba(124,58,237,0.1);padding:2px 7px;border-radius:5px;font-family:'SF Mono','Fira Code',monospace;font-size:0.82em;color:#c4b5fd}
.markdown-body pre{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:12px;padding:18px;overflow-x:auto;margin:14px 0;position:relative}
.markdown-body pre::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.3),transparent)}
.markdown-body pre code{background:none;padding:0;color:#d4d4d8;font-size:0.8rem}
.markdown-body hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.markdown-body blockquote{border-left:3px solid var(--accent);padding-left:16px;margin:14px 0;color:var(--muted)}
.markdown-body table{border-collapse:collapse;width:100%;margin:14px 0}
.markdown-body th,.markdown-body td{border:1px solid var(--border);padding:10px 14px;text-align:left;font-size:0.82rem}
.markdown-body th{background:rgba(255,255,255,0.08);color:#fff;font-weight:600;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.3px}
.markdown-body td{color:#d4d4d8}
.markdown-body tbody tr:first-child td{color:var(--green);font-weight:600}
.markdown-body a{color:var(--accent3);text-decoration:none}
.markdown-body a:hover{text-decoration:underline}

/* RAW */
.raw-output{font-family:'SF Mono','Fira Code',monospace;font-size:0.78rem;white-space:pre-wrap;color:var(--muted);line-height:1.65;background:rgba(0,0,0,0.3);border-radius:12px;padding:24px;border:1px solid var(--border)}

/* TASKS */
.task-list-section{padding:28px 36px}
.task-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;transition:all 0.15s}
.task-card:hover{border-color:var(--border2)}
.task-card .task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.task-card .task-dot.queued{background:var(--yellow)}
.task-card .task-dot.running{background:var(--accent2);animation:pulse 2s infinite}
.task-card .task-dot.submitted{background:var(--green)}
.task-card .task-dot.failed{background:var(--red)}
.task-card .task-name{flex:1;font-size:0.82rem;font-weight:500;color:#fff}
.task-card .task-status{padding:4px 12px;border-radius:20px;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.ts-queued{background:rgba(234,179,8,0.1);color:var(--yellow)}
.ts-running{background:rgba(99,102,241,0.1);color:var(--accent2)}
.ts-submitted{background:rgba(34,197,94,0.1);color:var(--green)}
.ts-failed{background:rgba(239,68,68,0.1);color:var(--red)}

/* PREVIEW */
.preview-container{position:relative;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;width:100%;height:calc(100vh - 220px);min-height:300px;resize:both}
.preview-chrome{display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,0.04);border-bottom:1px solid var(--border)}
.preview-dot{width:10px;height:10px;border-radius:50%}
.preview-dot.r{background:#ef4444}.preview-dot.y{background:#eab308}.preview-dot.g{background:#22c55e}
.preview-frame{width:100%;height:calc(100% - 32px);border:none;display:block;background:#fff}
.preview-size-label{position:absolute;bottom:8px;right:14px;font-size:0.6rem;color:var(--dim);background:rgba(0,0,0,0.7);padding:3px 8px;border-radius:4px;pointer-events:none;z-index:2}

.no-output{color:var(--dark);font-style:italic;padding:48px;text-align:center;font-size:0.88rem}
</style>
</head>
<body>

<div class="outer-layout">
<!-- Admin Nav Sidebar -->
<aside class="admin-nav-sidebar">
  <a href="/" class="sidebar-logo">DCN</a>
  <div class="sidebar-role">Admin Panel</div>
  <div class="nav-links">
    <a href="/submit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Submit Job
    </a>
    <a href="/ops">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/results" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      Results
    </a>
    <a href="/worker-logs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Worker Logs
    </a>
    <a href="/my-jobs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      My Jobs
    </a>
  </div>
  <div class="sidebar-bottom">
    <div class="sidebar-user" id="sidebarUser">
      <div class="sidebar-user-avatar" id="userAvatar">A</div>
      <div>
        <div class="sidebar-user-name" id="userName">Admin</div>
        <div class="sidebar-user-role-label">Admin</div>
      </div>
    </div>
    <a href="/auth/logout" class="sidebar-signout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </a>
  </div>
</aside>
<script>
fetch('/auth/me').then(r=>r.ok?r.json():null).then(u=>{
  if(u){
    document.getElementById('userName').textContent=u.name||u.username;
    document.getElementById('userAvatar').textContent=(u.name||u.username).charAt(0).toUpperCase();
  }
}).catch(()=>{});
</script>

<div class="results-main">
<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Job Results</h2>
      <div class="count" id="jobCount">Loading...</div>
    </div>
    <div class="search-box">
      <div class="search-wrap">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/></svg>
        <input type="text" id="searchInput" placeholder="Search jobs..." oninput="renderJobList()">
      </div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
      <button class="filter-btn" onclick="setFilter('queued', this)">Queued</button>
      <button class="filter-btn" onclick="setFilter('running', this)">Running</button>
    </div>
    <div class="job-list" id="jobList"></div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="content-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
      Select a job to view its output
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let allJobs = [];
  let selectedJobId = null;
  let currentFilter = 'all';
  let currentTab = 'rendered';

  async function loadJobs() {
    try {
      const resp = await fetch(`${API}/jobs`);
      allJobs = await resp.json();
      allJobs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      document.getElementById('jobCount').textContent = `${allJobs.length} job${allJobs.length !== 1 ? 's' : ''}`;
      renderJobList();
    } catch (e) {
      document.getElementById('jobCount').textContent = 'Error loading';
    }
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderJobList();
  }

  function renderJobList() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('jobList');
    const filtered = allJobs.filter(j => {
      if (currentFilter !== 'all' && j.status !== currentFilter) return false;
      if (search && !j.title.toLowerCase().includes(search) && !j.task_type.toLowerCase().includes(search)) return false;
      return true;
    });

    list.innerHTML = filtered.map(j => {
      const typeLabel = j.task_type.replace(/_/g, ' ');
      const date = new Date(j.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      return `
        <div class="job-item ${j.id === selectedJobId ? 'selected' : ''}" onclick="selectJob('${j.id}')">
          <div class="job-title">${j.title}</div>
          <div class="job-meta">
            <span class="status-dot status-${j.status}"></span>
            <span>${j.status}</span>
            <span class="type-badge type-${j.task_type}">${typeLabel}</span>
            <span style="margin-left:auto">${date}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  async function selectJob(jobId) {
    selectedJobId = jobId;
    renderJobList();

    const job = allJobs.find(j => j.id === jobId);
    if (!job) return;

    if (currentTab === 'preview') {
      currentTab = 'rendered';
    }

    let tasks = [];
    try {
      const resp = await fetch(`${API}/jobs/${jobId}/tasks`);
      tasks = await resp.json();
    } catch(e) {}

    const typeLabel = job.task_type.replace(/_/g, ' ');
    const date = new Date(job.created_at).toLocaleString();
    const output = job.final_output || '';
    const hasOutput = output.length > 0;
    const doneTasks = tasks.filter(t => t.status === 'submitted').length;

    let tabs = `
      <div class="tab ${currentTab === 'rendered' ? 'active' : ''}" onclick="switchTab('rendered')">Rendered</div>
      <div class="tab ${currentTab === 'raw' ? 'active' : ''}" onclick="switchTab('raw')">Raw</div>
      <div class="tab ${currentTab === 'tasks' ? 'active' : ''}" onclick="switchTab('tasks')">Tasks (${doneTasks}/${tasks.length})</div>
    `;
    if (isWebsite && hasOutput) {
      tabs += `<div class="tab ${currentTab === 'preview' ? 'active' : ''}" onclick="switchTab('preview')">Preview</div>`;
    }

    let content = '';
    if (currentTab === 'rendered') {
      if (hasOutput) {
        let cleaned = output;
        cleaned = cleaned.replace(/^=== (.+?) ===/gm, '## $1');
        const looksLikeHtml = cleaned.trim().startsWith('<') || cleaned.includes('<!DOCTYPE');
        if (looksLikeHtml && isWebsite) {
          cleaned = '```html\n' + cleaned + '\n```';
        }
        const html = marked.parse(cleaned);
        content = `<div class="output-area"><div class="markdown-body">${html}</div></div>`;
      } else {
        content = `<div class="no-output">No output yet &mdash; job is ${job.status}</div>`;
      }
    } else if (currentTab === 'raw') {
      content = `<div class="output-area"><div class="raw-output">${escapeHtml(output || 'No output')}</div></div>`;
    } else if (currentTab === 'tasks') {
      content = `<div class="task-list-section">${tasks.map(t => `
        <div class="task-card">
          <div class="task-dot ${t.status}"></div>
          <span class="task-name">${t.task_name}</span>
          <span class="task-status ts-${t.status}">${t.status}</span>
        </div>
      `).join('')}</div>`;
    } else if (currentTab === 'preview') {
      const cleaned = cleanHtmlOutput(output);
      content = `<div class="output-area">
        <div class="preview-container" id="previewContainer">
          <div class="preview-chrome"><div class="preview-dot r"></div><div class="preview-dot y"></div><div class="preview-dot g"></div></div>
          <iframe class="preview-frame" srcdoc="${escapeAttr(cleaned)}" sandbox="allow-scripts"></iframe>
          <div class="preview-size-label" id="previewSize"></div>
        </div>
      </div>`;
      setTimeout(() => {
        const c = document.getElementById('previewContainer');
        const s = document.getElementById('previewSize');
        if (c && s) {
          const update = () => { s.textContent = Math.round(c.offsetWidth) + ' x ' + Math.round(c.offsetHeight); };
          update();
          new ResizeObserver(update).observe(c);
        }
      }, 50);
    }

    document.getElementById('content').innerHTML = `
      <div class="detail-header">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div>
            <h2>${job.title}</h2>
            <div class="detail-meta">
              <span class="status-dot status-${job.status}"></span>
              <span>${job.status}</span>
              <span class="type-badge type-${job.task_type}">${typeLabel}</span>
              <span>${date}</span>
              ${hasOutput ? `<span>${output.length.toLocaleString()} chars</span>` : ''}
            </div>
          </div>
          ${hasOutput ? `<button class="copy-btn" onclick="copyOutput()">Copy Output</button>` : ''}
        </div>
      </div>
      <div class="tab-bar">${tabs}</div>
      <div id="tabContent" style="flex:1;overflow-y:auto;">${content}</div>
    `;
  }

  function switchTab(tab) {
    currentTab = tab;
    if (selectedJobId) selectJob(selectedJobId);
  }

  function copyOutput() {
    const job = allJobs.find(j => j.id === selectedJobId);
    if (job && job.final_output) {
      navigator.clipboard.writeText(job.final_output).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Output', 1500);
      });
    }
  }

  function cleanHtmlOutput(text) {
    let html = text;
    html = html.replace(/^=== .+ ===\s*/gm, '');
    html = html.replace(/```html?\s*/g, '').replace(/```\s*/g, '');
    html = html.replace(/^---$/gm, '');
    return html.trim();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function escapeAttr(str) {
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Auto-refresh
  loadJobs();
  setInterval(loadJobs, 10000);

  // Direct job link via hash
  if (window.location.hash) {
    const id = window.location.hash.slice(1);
    setTimeout(() => {
      if (allJobs.length) selectJob(id);
      else setTimeout(() => selectJob(id), 1000);
    }, 500);
  }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
      fetch('/auth/me').then(r => { if (!r.ok) window.location.href = '/login'; });
    }
  });
</script>
</div><!-- /results-main -->
</div><!-- /outer-layout -->
</body>
</html>
