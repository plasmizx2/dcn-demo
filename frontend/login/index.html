<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCN — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#14161e;--surface:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.12);--text:#e8e8ec;--muted:#b4b4bc;--dim:#8a8a96;--accent:#7c3aed;--accent2:#6366f1;--accent3:#3b82f6;--red:#ef4444;--green:#22c55e}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center}

  .login-card{width:100%;max-width:400px;padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:16px}
  .logo{text-align:center;margin-bottom:32px}
  .logo h1{font-weight:800;font-size:1.8rem;letter-spacing:-1px}
  .logo h1 span{background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo p{color:var(--dim);font-size:0.82rem;margin-top:6px}

  .field{margin-bottom:18px}
  .field label{display:block;font-size:0.72rem;font-weight:600;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
  .field input{width:100%;padding:12px 16px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.9rem;font-family:inherit;transition:all 0.2s}
  .field input:focus{outline:none;border-color:rgba(124,58,237,0.5);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}

  .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;margin-top:8px}
  .btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,58,237,0.35)}

  .error{color:var(--red);font-size:0.8rem;text-align:center;margin-top:14px;min-height:20px}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1><span>DCN</span></h1>
    <p>Distributed Computation Network</p>
  </div>
  <form id="loginForm" onsubmit="return doLogin(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autofocus required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
    </div>
    <button class="btn" type="submit">Sign In</button>
    <div class="error" id="error"></div>
  </form>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error');
  errEl.textContent = '';

  try {
    const resp = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await resp.json();
    if (resp.ok) {
      window.location.href = data.redirect || '/';
    } else {
      errEl.textContent = data.detail || 'Login failed';
    }
  } catch(err) {
    errEl.textContent = 'Could not reach server';
  }
  return false;
}
</script>
</body>
</html>
