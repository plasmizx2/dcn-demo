<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCN — Worker Logs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#14161e;--surface:rgba(255,255,255,0.06);--surface2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.14);
  --text:#e8e8ec;--muted:#b4b4bc;--dim:#8a8a96;--dark:#52525b;
  --accent:#7c3aed;--accent2:#6366f1;--accent3:#3b82f6;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Sidebar ── */
.app-layout{display:flex;min-height:100vh}
.sidebar{width:240px;min-width:240px;background:rgba(16,18,26,0.55);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-logo{font-weight:800;font-size:20px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;padding:0 24px;margin-bottom:8px;display:block}
.sidebar-role{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#7c3aed;padding:0 24px;margin-bottom:24px}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;flex:1;padding:0 12px}
.sidebar-nav a{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.45);text-decoration:none;font-size:0.88rem;font-weight:500;padding:10px 14px;border-radius:10px;transition:all 0.15s}
.sidebar-nav a:hover{color:#fff;background:rgba(255,255,255,0.04)}
.sidebar-nav a.active{color:#fff;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(59,130,246,0.10));border:1px solid rgba(124,58,237,0.2)}
.sidebar-nav a svg{width:18px;height:18px;flex-shrink:0}
.sidebar-bottom{padding:16px 12px 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:auto}
.sidebar-user{padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
.sidebar-user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-user-name{font-size:0.85rem;font-weight:600;color:#fff}
.sidebar-user-role{font-size:0.7rem;color:rgba(255,255,255,0.35);text-transform:capitalize}
.sidebar-signout{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.35);text-decoration:none;font-size:0.82rem;font-weight:500;padding:10px 14px;border-radius:10px;transition:all 0.15s}
.sidebar-signout:hover{color:#ef4444;background:rgba(239,68,68,0.06)}
.sidebar-signout svg{width:16px;height:16px}

.main-content{margin-left:240px;flex:1;min-width:0;padding:32px 40px 60px}

/* ── Page ── */
.page-title{font-size:1.5rem;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:4px}
.page-subtitle{font-size:0.85rem;color:var(--dim);margin-bottom:28px}

/* ── Worker Cards ── */
.workers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:32px}
.worker-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:24px;transition:all 0.2s;cursor:pointer}
.worker-card:hover{border-color:rgba(124,58,237,0.25);background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.worker-card.selected{border-color:rgba(124,58,237,0.4);background:rgba(124,58,237,0.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.worker-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.worker-name{font-size:0.95rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.worker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.worker-dot.online{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.4)}
.worker-dot.busy{background:#f97316;animation:busyPulse 1.5s infinite}
.worker-dot.offline{background:rgba(255,255,255,0.15)}
@keyframes busyPulse{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,0.4)}50%{box-shadow:0 0 0 4px rgba(249,115,22,0)}}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.badge-online{background:rgba(34,197,94,0.12);color:#4ade80}
.badge-busy{background:rgba(249,115,22,0.12);color:#fb923c}
.badge-offline{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.3)}

.worker-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.worker-stat{text-align:center;padding:10px 8px;background:rgba(0,0,0,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:10px;border:1px solid rgba(255,255,255,0.04)}
.worker-stat-val{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.worker-stat-label{font-size:0.62rem;color:var(--dark);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:600}
.worker-meta{font-size:0.75rem;color:var(--dark);margin-top:12px;display:flex;gap:16px}

/* ── Task History ── */
.detail-section{max-width:1000px}
.detail-title{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-0.3px}
.detail-subtitle{font-size:0.82rem;color:var(--dim);margin-bottom:20px}

.history-table{width:100%;border-collapse:collapse;background:rgba(255,255,255,0.02);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:14px;overflow:hidden}
.history-table th{text-align:left;font-size:0.65rem;color:rgba(255,255,255,0.50);text-transform:uppercase;letter-spacing:0.8px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);font-weight:600;background:rgba(0,0,0,0.1)}
.history-table td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.82rem;color:rgba(255,255,255,0.70)}
.history-table tr:last-child td{border-bottom:none}
.history-table tr:hover td{background:rgba(124,58,237,0.04)}
.mono{font-family:'SF Mono','Fira Code',monospace;font-size:0.72rem;color:rgba(255,255,255,0.45)}
.task-badge{padding:3px 10px;border-radius:100px;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.tb-submitted{background:rgba(34,197,94,0.1);color:#4ade80}
.tb-failed{background:rgba(239,68,68,0.1);color:#f87171}
.tb-running{background:rgba(59,130,246,0.1);color:#60a5fa}

.empty-detail{text-align:center;padding:60px 40px;color:var(--dim);font-size:0.88rem}
.empty-detail svg{width:40px;height:40px;color:var(--dark);margin-bottom:12px;display:block;margin:0 auto 12px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

@media(max-width:768px){
  .sidebar{display:none}
  .main-content{margin-left:0;padding:24px 20px}
  .workers-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app-layout">

<!-- Sidebar -->
<aside class="sidebar">
  <a href="/" class="sidebar-logo">DCN</a>
  <div class="sidebar-role">Admin Panel</div>
  <nav class="sidebar-nav">
    <a href="/submit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Submit Job
    </a>
    <a href="/ops">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      Results
    </a>
    <a href="/worker-logs" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Worker Logs
    </a>
    <a href="/my-jobs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      My Jobs
    </a>
  </nav>
  <div class="sidebar-bottom">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar" id="userAvatar">A</div>
      <div>
        <div class="sidebar-user-name" id="userName">Admin</div>
        <div class="sidebar-user-role">Admin</div>
      </div>
    </div>
    <a href="/auth/logout" class="sidebar-signout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </a>
  </div>
</aside>

<script>
fetch('/auth/me').then(r=>r.ok?r.json():null).then(u=>{
  if(u){
    document.getElementById('userName').textContent=u.name||u.username;
    document.getElementById('userAvatar').textContent=(u.name||u.username).charAt(0).toUpperCase();
  }
}).catch(()=>{});
</script>

<!-- Main -->
<div class="main-content">
  <h1 class="page-title">Worker Logs</h1>
  <p class="page-subtitle">Monitor worker nodes, view task history, and diagnose issues.</p>

  <div class="workers-grid" id="workersGrid">
    <div style="color:var(--dim);font-size:0.85rem">Loading workers...</div>
  </div>

  <div class="detail-section" id="detailSection">
    <div class="empty-detail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Select a worker to view its task history
    </div>
  </div>
</div>

</div><!-- /app-layout -->

<script>
const API = window.location.origin;
let selectedWorkerId = null;
let allWorkers = [];

async function loadWorkers() {
  try {
    const resp = await fetch(`${API}/monitor/workers`);
    allWorkers = await resp.json();
    renderWorkers();
  } catch(e) {
    document.getElementById('workersGrid').innerHTML = '<div style="color:var(--dim)">Failed to load workers</div>';
  }
}

function renderWorkers() {
  const grid = document.getElementById('workersGrid');
  if (!allWorkers.length) {
    grid.innerHTML = '<div style="color:var(--dim);font-size:0.85rem;padding:20px 0">No workers registered yet.</div>';
    return;
  }

  grid.innerHTML = allWorkers.map(w => {
    const status = (w.status || 'offline').toLowerCase();
    const hb = w.last_heartbeat ? timeAgo(new Date(w.last_heartbeat)) : 'never';
    const created = new Date(w.created_at).toLocaleDateString('en-US', {month:'short',day:'numeric'});
    return `
      <div class="worker-card ${selectedWorkerId === w.id ? 'selected' : ''}" onclick="selectWorker('${w.id}')">
        <div class="worker-card-top">
          <div class="worker-name">
            <span class="worker-dot ${status}"></span>
            ${escapeHtml(w.node_name)}
          </div>
          <span class="badge badge-${status}">${status}</span>
        </div>
        <div class="worker-meta">
          <span>Last heartbeat: ${hb}</span>
          <span>Since: ${created}</span>
        </div>
      </div>`;
  }).join('');
}

async function selectWorker(workerId) {
  selectedWorkerId = workerId;
  renderWorkers();

  const worker = allWorkers.find(w => w.id === workerId);
  const section = document.getElementById('detailSection');

  section.innerHTML = '<div style="color:var(--dim);font-size:0.85rem;padding:20px 0">Loading task history...</div>';

  try {
    const resp = await fetch(`${API}/monitor/worker-history/${workerId}`);
    const history = await resp.json();

    const workerName = worker ? escapeHtml(worker.node_name) : workerId.substring(0,8);

    if (!history.length) {
      section.innerHTML = `
        <div class="detail-title">${workerName}</div>
        <div class="detail-subtitle">No tasks processed yet</div>
        <div class="empty-detail" style="padding:40px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6M12 9v6"/><circle cx="12" cy="12" r="10"/></svg>
          This worker hasn't completed any tasks yet.
        </div>`;
      return;
    }

    const completed = history.filter(h => h.status === 'submitted').length;
    const failed = history.filter(h => h.status === 'failed').length;
    const totalTime = history.reduce((sum, h) => sum + (h.execution_time_seconds || 0), 0);
    const avgTime = history.length > 0 ? (totalTime / history.length).toFixed(1) : '0';

    section.innerHTML = `
      <div class="detail-title">${workerName}</div>
      <div class="detail-subtitle">${history.length} tasks processed &middot; ${completed} completed &middot; ${failed} failed &middot; avg ${avgTime}s per task</div>
      <table class="history-table">
        <thead>
          <tr>
            <th>Task</th>
            <th>Job</th>
            <th>Status</th>
            <th>Time</th>
            <th>Completed</th>
          </tr>
        </thead>
        <tbody>
          ${history.map(h => {
            const date = h.created_at ? new Date(h.created_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '-';
            const time = h.execution_time_seconds ? h.execution_time_seconds.toFixed(1)+'s' : '-';
            const statusClass = h.status === 'submitted' ? 'tb-submitted' : h.status === 'failed' ? 'tb-failed' : 'tb-running';
            return `
              <tr>
                <td>${escapeHtml(h.task_name || h.task_id?.substring(0,8) || '-')}</td>
                <td><span class="mono">${(h.job_title || h.job_id?.substring(0,8) || '-')}</span></td>
                <td><span class="task-badge ${statusClass}">${h.status || '-'}</span></td>
                <td>${time}</td>
                <td>${date}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    section.innerHTML = `<div style="color:var(--dim)">Failed to load worker history.</div>`;
  }
}

function timeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);
  if (seconds < 60) return seconds + 's ago';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + 'm ago';
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + 'h ago';
  return Math.floor(hours / 24) + 'd ago';
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

loadWorkers();
setInterval(loadWorkers, 5000);
</script>
</body>
</html>
